spring:
  application:
    name: travelTrack

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:traveltrack}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          multiplier: 2
          max-retries: 3

jwt:
  secret: ${JWT_SECRET:2a2a67dc7a5c418513539c15acfc4f9f01e3d642ff2671ad8459c3b7184060a7087c3f6951a06ff9bf576b58402d2aa289f6dce9db9c8e2ae4e761cb6e7a358f}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900000}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000}

app:
  admin:
    email: ${ADMIN_EMAIL:admin@traveltrack.local}
    ecpKys : ${ENCRYPTION_KEY:YXpeWuGjfIG8wx8+QRtEJg==}
